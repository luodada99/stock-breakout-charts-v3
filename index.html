}

function closeAllPanels() {
  // 兼容旧调用
}

function renderAllSubBar() {
  let html = '<span class="sub-label">状态:</span>';
  const opts = [['全部','全部'],['已突破','已突破'],['接近突破','接近突破'],['箱体内','箱体内']];
  opts.forEach(o => {
    const cls = currentStatus.all === o[1] ? ' active-red' : '';
    html += '<span class="sub-item' + cls + '" data-type="allstatus" data-val="' + o[0] + '">' + o[1] + '</span>';
  });
  document.getElementById('subFilterBar').innerHTML = html;
}

function renderSectorSubBar() {
  const sectors = ['全部板块'];
  const seen = new Set();
  stockData.forEach(s => { if (s[2] && !seen.has(s[2])) { seen.add(s[2]); sectors.push(s[2]); } });
  sectors.sort((a,b) => a === '全部板块' ? -1 : b === '全部板块' ? 1 : a.localeCompare(b));
  
  let html = '<span class="sub-label">状态:</span>';
  ['已突破','接近突破','箱体内'].forEach(st => {
    const cls = currentStatus.sector === st ? ' active-orange' : '';
    html += '<span class="sub-item' + cls + '" data-type="status" data-val="' + st + '">' + st + '</span>';
  });
  html += '<span class="sub-sep"></span><span class="sub-label">板块:</span>';
  sectors.forEach(sec => {
    const cls = currentSector === sec ? ' active-orange' : '';
    html += '<span class="sub-item' + cls + '" data-type="sector" data-val="' + sec + '">' + sec + '</span>';
  });
  document.getElementById('subFilterBar').innerHTML = html;
}

function renderTimeSubBar() {
  let html = '<span class="sub-label">状态:</span>';
  ['已突破','接近突破','箱体内'].forEach(st => {
    const cls = currentStatus.time === st ? ' active-green' : '';
    html += '<span class="sub-item' + cls + '" data-type="status" data-val="' + st + '">' + st + '</span>';
  });
  html += '<span class="sub-sep"></span><span class="sub-label">吸筹:</span>';
  const times = [['all','全部时间'],['short','才吸筹(0-7天)'],['month','吸筹一个月'],['twomonth','吸筹两个月']];
  times.forEach(t => {
    const cls = currentTimeRange === t[0] ? ' active-green' : '';
    html += '<span class="sub-item' + cls + '" data-type="time" data-val="' + t[0] + '">' + t[1] + '</span>';
  });
  document.getElementById('subFilterBar').innerHTML = html;
}

// 事件委托：统一处理子选项点击
document.getElementById('subFilterBar').addEventListener('click', function(e) {
  const item = e.target.closest('.sub-item');
  if (!item) return;
  const type = item.dataset.type;
  const val = item.dataset.val;
  if (type === 'allstatus') {
    currentStatus.all = val;
    renderAllSubBar();
  } else if (type === 'status') {
    currentStatus[currentDim] = val;
    if (currentDim === 'sector') renderSectorSubBar(); else renderTimeSubBar();
  } else if (type === 'sector') {
    currentSector = val;
    renderSectorSubBar();
  } else if (type === 'time') {
    currentTimeRange = val;
    renderTimeSubBar();
  }
  buildCards();
});

// 计算距上次吸筹的天数（找最后一次VAR7>阈值的日期，算距今多少天）
function calcAccumulationDays(var7) {
  if (!var7 || var7.length === 0) return 999;
  for (let i = var7.length - 1; i >= 0; i--) {
    if (var7[i] > 0.001) return var7.length - 1 - i; // 距今多少天
  }
  return 999; // 从未吸筹
}

  function destroyAllCharts() {
  chartInstances.forEach(c => { try { c.dispose(); } catch(e) {} });
  chartInstances = [];
}

function buildCards() {
  destroyAllCharts();
  const container = document.getElementById('stockContainer');
  container.innerHTML = '';
  let visibleCount = 0;

  const pinned = getPinned();
  const favorites = getFavorites();

  // 排序：置顶的排最前面，其余按增强评分排序
  let sortedData = stockData.map((s, idx) => ({ s, idx }));
  sortedData.sort((a, b) => {
    const ap = pinned.includes(a.s[0]) ? 1 : 0;
    const bp = pinned.includes(b.s[0]) ? 1 : 0;
    if (bp - ap !== 0) return bp - ap;
    // 按增强评分排序（数组第30个元素，不存在则回退到原评分第4个元素）
    const aScore = a.s[30] || a.s[4] || 0;
    const bScore = b.s[30] || b.s[4] || 0;
    return bScore - aScore;
  });

  // 吸筹时间维度需要按距上次吸筹天数排序（最近吸筹的排前面）
  if (currentDim === 'time') {
    sortedData.sort((a, b) => {
      const ap = pinned.includes(a.s[0]) ? 1 : 0;
      const bp = pinned.includes(b.s[0]) ? 1 : 0;
      if (bp - ap !== 0) return bp - ap;
      const ad = calcAccumulationDays(a.s[11]);
      const bd = calcAccumulationDays(b.s[11]);
      return ad - bd; // 天数小的（最近吸筹）排前面
    });
  }

  sortedData.forEach(({ s, idx }) => {
    const [code, name, sector, position, score, concepts, boxUpper, boxLower, dates, klines, volumes, var7, , , , var7RawMax, var7NormMax, risks, b2, sma2, boxTop, ema10d, ema25d, ema40d, ema80d, buySigs, bigNet, aiRating, aiLabel, pegValue, pegRating, enhancedScore] = s;
    // 三维度筛选
    if (currentFilter === 'favorites') {
      if (!favorites.includes(code)) return;
    } else if (currentDim === 'all') {
      // 全部维度：可按状态筛选
      if (currentStatus.all !== '全部') {
        const statusMap = {'已突破':'breaking_out','接近突破':'near_top','箱体内':'in_box'};
        if (position !== statusMap[currentStatus.all]) return;
      }
    } else if (currentDim === 'sector') {
      // 板块维度：先筛选状态，再筛选板块
      const statusMap = {'已突破':'breaking_out','接近突破':'near_top','箱体内':'in_box'};
      if (position !== statusMap[currentStatus.sector]) return;
      if (currentSector !== '全部板块' && sector !== currentSector) return;
    } else if (currentDim === 'time') {
      // 吸筹时间维度：先筛选状态，再按距上次吸筹的天数筛选
      const statusMap = {'已突破':'breaking_out','接近突破':'near_top','箱体内':'in_box'};
      if (position !== statusMap[currentStatus.time]) return;
      const accDays = calcAccumulationDays(var7);
      if (currentTimeRange === 'short' && accDays > 7) return;
      if (currentTimeRange === 'month' && (accDays < 8 || accDays > 60)) return;
      if (currentTimeRange === 'twomonth' && accDays < 61) return;
    }
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      if (!code.toLowerCase().includes(q) && !name.toLowerCase().includes(q) && !sector.toLowerCase().includes(q) && !concepts.toLowerCase().includes(q)) return;
    }
    visibleCount++;
    const posStr = posMap[position] || position;
    const tagClass = posTagClass[position] || 'tag-near';
    const latestClose = klines[klines.length-1][1].toFixed(2);
    const isPinned = pinned.includes(code);
    const isFav = favorites.includes(code);
    const accDays = calcAccumulationDays(var7);

    // 爆雷隐患标签（第二行，右对齐，不干扰右上角文字）
    let riskHtml = '';
    if (risks && risks.length > 0) {
      const dangerKeywords = ['立案调查', '退市风险', '行政处罚', '被执行'];
      riskHtml = '<div class="risk-row">';
      risks.forEach(r => {
        const cls = dangerKeywords.some(d => r.includes(d)) ? 'risk-danger' : 'risk-warn';
        riskHtml += '<span class="risk-item ' + cls + '">' + r + '</span>';
      });
      riskHtml += '</div>';
    }

    const card = document.createElement('div');
    card.className = 'stock-card' + (isPinned ? ' card-pinned' : '');
    card.dataset.idx = idx;
    card.innerHTML = '<div class="stock-header">' +
      '<div class="stock-title">' +
      '<div class="stock-title-row"><span class="stock-name">' + name + '</span><span class="stock-code">' + code + '</span><span class="stock-sector">' + sector + '</span>' +
      '<button class="action-btn' + (isPinned ? ' active-pin' : '') + '" onclick="togglePin(\'' + code + '\')" title="置顶/取消置顶">' + (isPinned ? '已置顶' : '置顶') + '</button>' +
      '<button class="action-btn' + (isFav ? ' active-fav' : '') + '" onclick="toggleFav(\'' + code + '\')" title="加入/移除自选">' + (isFav ? '★已选' : '☆自选') + '</button>' +
      '</div>' +
      (concepts ? '<div class="stock-concepts">' + concepts + '</div>' : '') +
      '</div>' +
      '<div class="stock-tags">' +
        (aiRating && aiRating !== '未评估' ? '<span class="tag tag-ai-' + aiRating.toLowerCase() + '" title="AI深度投研评级">AI ' + (aiLabel || aiRating) + '</span>' : '') +
        (pegValue && pegValue !== 'N/A' ? '<span class="tag tag-peg" title="PEG估值">PEG ' + pegValue + '</span>' : '') +
        '<span class="tag ' + tagClass + '">' + posStr + '</span>' +
        '<span class="tag tag-score">评分' + (enhancedScore || score) + '</span>' +
      '</div>' +
      '</div>' +
      riskHtml +
      '<div class="chart-section">' +
      '<div class="section-label">日线 K线+MA均线</div><div class="chart-kline"></div>' +
      '<div class="section-label">箱体指标 B2红线/SMA2青线/箱顶蓝线/EMA10黄/EMA25灰/EMA40绿/EMA80橙 + 买卖信号</div><div class="chart-box"></div>' +
      '<div class="section-label">成交量 红涨绿跌</div><div class="chart-side chart-vol"></div>' +
      '<div class="section-label">主力净流入 红色净流入/绿色净流出</div><div class="chart-side chart-fund"></div>' +
      '<div class="section-label">VAR7 主力吸筹 蓝紫渐变柱+吸筹均线</div><div class="chart-side chart-var7"></div>' +
      '</div>' +
      '<div class="stats-bar">' +
      '<span>箱体上沿 <strong>' + boxUpper.toFixed(2) + '</strong></span>' +
      '<span>箱体下沿 <strong>' + boxLower.toFixed(2) + '</strong></span>' +
      '<span>最新价 <strong>' + latestClose + '</strong></span>' +
      '<span>VAR7峰值 <strong>' + var7RawMax.toFixed(2) + '</strong></span>' +
      '<span>VAR7归一化 <strong>' + var7NormMax + '%</strong></span>' +
      '<span>吸筹天数 <strong>' + (accDays >= 999 ? '无' : accDays + '天前') + '</strong></span>' +
      '</div>';
    container.appendChild(card);
    // 懒加载：由IntersectionObserver在卡片进入视口时渲染图表
  });

  document.getElementById('resultCount').textContent = '显示 ' + visibleCount + ' 只';
  if (visibleCount === 0) container.innerHTML = '<div class="no-result">没有匹配的股票</div>';

  // 懒加载：IntersectionObserver只渲染可见区域的卡片图表
  if (cardObserver) cardObserver.disconnect();
  renderedCards.clear();
  cardObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var cardEl = entry.target;
        var ci = parseInt(cardEl.dataset.idx);
        if (!renderedCards.has(ci)) {
          renderedCards.add(ci);
          renderStock(cardEl, ci);
        }
      }
    });
  }, { rootMargin: '300px' });
  container.querySelectorAll('.stock-card').forEach(function(c) { cardObserver.observe(c); });
}

function onFilterChange() {
  currentSearch = document.getElementById('searchInput').value.trim();
  buildCards();
}

// 自选按钮点击
document.getElementById('filterBar').addEventListener('click', function(e) {
  if (e.target.classList.contains('filter-btn') && e.target.dataset.filter === 'favorites') {
    if (currentFilter === 'favorites') {
      currentFilter = 'all';
      currentDim = 'all';
      e.target.classList.remove('active');
      document.getElementById('dimAll').className = 'dim-btn active-all';
    } else {
      currentFilter = 'favorites';
      e.target.classList.add('active');
      document.getElementById('dimAll').className = 'dim-btn';
      document.getElementById('dimSector').className = 'dim-btn';
      document.getElementById('dimTime').className = 'dim-btn';
      closeAllPanels();
    }
    buildCards();
  }
});

buildCards();

  }, 200);
